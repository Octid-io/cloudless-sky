syntax = "proto3";
package benchmark;

// MCP-01: tools/call get_weather
message McpToolCall {
  string method = 1;
  string name = 2;
  string location = 3;
}

// MCP-02, MCP-03: tool result
message McpToolResult {
  string text = 1;
  bool is_error = 2;
}

// MCP-04: tools/list
message McpListRequest {
  string method = 1;
  string cursor = 2;
}

// MCP-05: progress
message McpProgress {
  string token = 1;
  int32 progress = 2;
  int32 total = 3;
  string message = 4;
}

// OAI-01: function call
message OaiFuncCall {
  string name = 1;
  string location = 2;
  string unit = 3;
}

// OAI-02: function output
message OaiFuncOutput {
  string call_id = 1;
  int32 temperature = 2;
  string unit = 3;
}

// OAI-03: function definition
message OaiFuncDef {
  string name = 1;
  string description = 2;
  string param_name = 3;
  string param_type = 4;
  string param_desc = 5;
  bool required = 6;
}

// OAI-04: tool call
message OaiToolCall {
  string call_id = 1;
  string name = 2;
  string order_id = 3;
}

// OAI-05: tool result
message OaiToolResult {
  string call_id = 1;
  string delivery_date = 2;
}

// A2A-01: message/send
message A2aMessage {
  string method = 1;
  string role = 2;
  string text = 3;
  string msg_id = 4;
}

// A2A-02: task response
message A2aTaskResponse {
  string task_id = 1;
  string state = 2;
  string timestamp = 3;
  string artifact_id = 4;
  string artifact_text = 5;
}

// A2A-03: agent card
message A2aAgentCard {
  string name = 1;
  string description = 2;
  string url = 3;
  string version = 4;
  bool streaming = 5;
  bool push_notifications = 6;
  string skill_id = 7;
  string skill_name = 8;
  string skill_desc = 9;
}

// A2A-04: transfer
message A2aTransfer {
  string action = 1;
  string from_account = 2;
  string to_account = 3;
  double amount = 4;
  string currency = 5;
}

// CREW-01: task delegation
message CrewTask {
  string description = 1;
  string expected_output = 2;
  string agent_role = 3;
  string agent_goal = 4;
  string tool = 5;
  bool async_execution = 6;
}

// CREW-02: task output
message CrewTaskOutput {
  string description = 1;
  string summary = 2;
  string raw = 3;
  repeated string main_points = 4;
  repeated string technologies = 5;
  string agent = 6;
}

// CREW-03: conversation message
message ConvMessage {
  string role = 1;
  string content = 2;
}
message ConvHistory {
  repeated ConvMessage messages = 1;
}

// CREW-04: task with context
message CrewTaskContext {
  string description = 1;
  string expected_output = 2;
  string agent = 3;
  repeated string context = 4;
}

// AG-01: handoff
message AgHandoff {
  string id = 1;
  string source = 2;
  string content = 3;
  string target = 4;
  string created_at = 5;
}

// AG-02: structured message
message AgStructured {
  string source = 1;
  string thoughts = 2;
  string response = 3;
  string created_at = 4;
}

// AG-03: function call
message AgFuncCall {
  string name = 1;
  string arguments = 2;
}

// AG-04: agent config
message AgHandoffDef {
  string target = 1;
  string description = 2;
  string name = 3;
  string message = 4;
}
message AgAgentConfig {
  string provider = 1;
  string component_type = 2;
  int32 version = 3;
  string name = 4;
  string model_provider = 5;
  string model = 6;
  repeated AgHandoffDef handoffs = 7;
  string system_message = 8;
  string description_text = 9;
}

// DOM-01: ICD lookup
message DomIcdLookup {
  string method = 1;
  string tool = 2;
  string code_system = 3;
  string code = 4;
  bool include_desc = 5;
}

// DOM-02: payment
message DomPayment {
  string call_id = 1;
  string name = 2;
  string from_account = 3;
  string to_account = 4;
  double amount = 5;
  string currency = 6;
  string reference = 7;
}

// DOM-03: encrypt
message DomEncrypt {
  string method = 1;
  string target = 2;
  string algorithm = 3;
  bool rotate = 4;
}

// DOM-04: scale
message DomScale {
  string service = 1;
  int32 replicas = 2;
  string cpu = 3;
  string memory = 4;
}

// DOM-05: audit
message DomAudit {
  string description = 1;
  string agent_role = 2;
  string agent_goal = 3;
  string txn_id = 4;
  string check_type = 5;
  string result = 6;
  string severity = 7;
  string timestamp = 8;
}

// DOM-06: ATT&CK lookup
message DomAttackLookup {
  string method = 1;
  string tool = 2;
  string framework = 3;
  string technique = 4;
  bool subtechniques = 5;
  bool mitigations = 6;
}

// DOM-07: route
message DomRoute {
  string call_id = 1;
  string name = 2;
  double orig_lat = 3;
  double orig_lng = 4;
  double dest_lat = 5;
  double dest_lng = 6;
  string mode = 7;
  string avoid = 8;
}
